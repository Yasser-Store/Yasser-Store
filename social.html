<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعم سوشيال Yasser-Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .navbar { background-color: #1a0033; border-bottom: 2px solid #4d0099; }
        .card { background-color: #26004d; border: 2px solid #4d0099; border-radius: 15px; overflow: hidden; margin-bottom: 20px; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card-img-top { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .card-body { color: #fff; text-align: center; padding: 10px; }
        .btn-back { background-color: #8000ff; color: white; border: none; padding: 5px 15px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand fw-bold">الألعاب</span>
        <button class="btn btn-back" onclick="history.back()">رجوع</button>
    </div>
</nav>

<div class="container mt-4">
    <div class="row g-3" id="gamesContainer">
        <h4 class="text-center mt-5 text-secondary">جاري تحميل البطاقات...</h4>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAEKNtK6UVtLySjxp5IlXL7es8bC8M9w-Y",
      authDomain: "yasser-store-7e736.firebaseapp.com",
      projectId: "yasser-store-7e736",
      storageBucket: "yasser-store-7e736.firebasestorage.app",
      messagingSenderId: "363907199851",
      appId: "1:363907199851:web:f36f479fa91b53823c922e"
    };
    const db = getFirestore(initializeApp(firebaseConfig));

    async function loadGames() {
        const container = document.getElementById('gamesContainer');
        try {
            const querySnapshot = await getDocs(collection(db, "products"));
            container.innerHTML = "";
            let found = false;

            querySnapshot.forEach((doc) => {
                const p = doc.data();
                if (p.category === "social") {
                    found = true;
                    container.innerHTML += `
                        <div class="col-6 col-md-4">
                            <div class="card">
                                <img src="${p.image}" class="card-img-top">
                                <div class="card-body"><h6>${p.name}</h6></div>
                            </div>
                        </div>`;
                }
            });

            if (!found) {
                container.innerHTML = "<h4 class='text-center mt-5'>لا توجد ألعاب مضافة حالياً.</h4>";
            }
        } catch (e) {
            container.innerHTML = "<h4 class='text-center mt-5'>حدث خطأ في الاتصال.</h4>";
        }
    }
    loadGames();
</script>
</body>
</html>
