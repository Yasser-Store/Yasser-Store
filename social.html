<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعم سوشيال - Yasser-Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .navbar { background-color: #1a0033 !important; }
        .card { background-color: #26004d; border: 2px solid #4d0099; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .card-img-top { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .card-body { color: #fff; text-align: center; padding: 10px; }
        .btn-back { background-color: #8000ff; color: white; border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark p-3"><div class="container"><span class="navbar-brand fw-bold">دعم سوشيال</span><button class="btn btn-back btn-sm" onclick="history.back()">رجوع</button></div></nav>
    <div class="container mt-4">
        <div class="row g-3">
            <div class="col-4"><div class="card"><img src="social1.jpg" class="card-img-top"><div class="card-body"><h6>خدمة 1</h6></div></div></div>
            <div class="col-4"><div class="card"><img src="social2.jpg" class="card-img-top"><div class="card-body"><h6>خدمة 2</h6></div></div></div>
            <div class="col-4"><div class="card"><img src="social3.jpg" class="card-img-top"><div class="card-body"><h6>خدمة 3</h6></div></div></div>
        </div>
    </div>
</body>
</html>
