<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي - Yasser-Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .card { background-color: #26004d; border: 2px solid #4d0099; border-radius: 15px; padding: 20px; color: #fff; }
        h3 { color: #ffffff !important; }
        label { color: #ffffff !important; margin-bottom: 5px; font-weight: bold; }
        .btn-save { background-color: #8000ff; color: white; border: none; }
        .btn-save:hover { background-color: #6a00cc; }
        input { background-color: #1a0033 !important; color: white !important; border: 1px solid #4d0099 !important; }
        .btn-secondary { background-color: #4d0099; border: none; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card">
        <h3 class="text-center mb-4">إعدادات الملف الشخصي</h3>
        <form id="profileForm">
            <div class="mb-3">
                <label>الاسم الكامل</label>
                <input type="text" id="fullName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>رقم الهاتف</label>
                <input type="tel" id="phone" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-save w-100">حفظ البيانات</button>
        </form>
        <button class="btn btn-secondary w-100 mt-2" onclick="window.location.href='index.html'">العودة للمتجر</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAEKNtK6UVtLySjxp5IlXL7es8bC8M9w-Y",
        authDomain: "yasser-store-7e736.firebaseapp.com",
        projectId: "yasser-store-7e736",
        storageBucket: "yasser-store-7e736.firebasestorage.app",
        messagingSenderId: "363907199851",
        appId: "1:363907199851:web:f36f479fa91b53823c922e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            document.getElementById('fullName').value = docSnap.data().fullName || "";
            document.getElementById('phone').value = docSnap.data().phone || "";
        }
    });

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = auth.currentUser;
        const fullName = document.getElementById('fullName').value;
        const phone = document.getElementById('phone').value;

        await setDoc(doc(db, "users", user.uid), { fullName, phone }, { merge: true });

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjd078aW48syj19BIaPXSNmenExVLZm-EJ-j10kl0fwXwMQtU8JVK-JidsNSCGAQzjQA/exec";
        
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ fullName, phone, action: "update_profile" })
        });

        alert("تم تحديث معلوماتك وإرسالها للمتجر بنجاح!");
    });
</script>

</body>
</html>
