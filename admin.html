<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم ياسر تيك - الإدارة الشاملة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; }
        .card { background-color: #26004d; border: 2px solid #4d0099; padding: 20px; color: #fff; margin-bottom: 20px; }
        input, select { background-color: #1a0033 !important; color: white !important; border: 1px solid #4d0099 !important; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card">
        <h3>إضافة منتج جديد</h3>
        <input type="text" id="pName" class="form-control mb-2" placeholder="اسم المنتج">
        <select id="pCat" class="form-control mb-2">
            <option value="games">ألعاب</option>
            <option value="apps">تطبيقات</option>
            <option value="social">سوشيال</option>
            <option value="cards">بطاقات</option>
        </select>
        <input type="file" id="pImage" class="form-control mb-2">
        <button id="addBtn" class="btn btn-primary w-100">إضافة المنتج</button>
    </div>

    <div class="card">
        <h3>قائمة المنتجات</h3>
        <table class="table table-dark">
            <thead><tr><th>الاسم</th><th>القسم</th><th>تحكم</th></tr></thead>
            <tbody id="pTable"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { /* (إعداداتك) */ };
    const db = getFirestore(initializeApp(firebaseConfig));

    // جلب وعرض المنتجات
    async function renderTable() {
        const snapshot = await getDocs(collection(db, "products"));
        const tbody = document.getElementById('pTable');
        tbody.innerHTML = "";
        snapshot.forEach(docSnap => {
            const p = docSnap.data();
            tbody.innerHTML += `<tr>
                <td>${p.name}</td>
                <td>${p.category}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editP('${docSnap.id}', '${p.name}', '${p.category}')">تعديل</button>
                    <button class="btn btn-sm btn-danger" onclick="delP('${docSnap.id}')">حذف</button>
                </td>
            </tr>`;
        });
    }

    // دالة التعديل المتكاملة
    window.editP = async (id, oldName, oldCat) => {
        const newName = prompt("الاسم الجديد:", oldName);
        const newCat = prompt("القسم الجديد (games/apps/social/cards):", oldCat);
        if (newName && newCat) {
            await updateDoc(doc(db, "products", id), { name: newName, category: newCat });
            alert("تم التعديل!");
            renderTable();
        }
    };

    window.delP = async (id) => {
        if(confirm("متأكد من الحذف؟")) {
            await deleteDoc(doc(db, "products", id));
            renderTable();
        }
    };

    // إضافة منتج جديد (مع رفع الصورة)
    document.getElementById('addBtn').addEventListener('click', async () => {
        const file = document.getElementById('pImage').files[0];
        if(!file) return alert("اختر صورة!");
        
        // رفع الصورة
        const formData = new FormData();
        formData.append('image', file);
        const res = await fetch('https://api.imgbb.com/1/upload?key=d4153c26566671cd622f560fa7986321', { method: 'POST', body: formData });
        const imgData = await res.json();

        // حفظ في فايربيس
        await setDoc(doc(db, "products", Date.now().toString()), {
            name: document.getElementById('pName').value,
            category: document.getElementById('pCat').value,
            image: imgData.data.url
        });
        alert("تم الإضافة!");
        renderTable();
    });

    renderTable();
</script>
</body>
</html>
