<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم ياسر تيك - الإدارة الشاملة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .card { background-color: #26004d; border: 2px solid #4d0099; padding: 20px; color: #fff; margin-bottom: 20px; border-radius: 15px;}
        input, select { background-color: #1a0033 !important; color: white !important; border: 1px solid #4d0099 !important; }
        .btn-primary { background-color: #8000ff; border: none; }
        .package-row { background-color: #1a0033; padding: 10px; border-radius: 8px; border: 1px dashed #8000ff; margin-bottom: 10px; }
        #authStatus { padding: 20px; text-align: center; font-size: 1.2rem; }
        .nav-link { cursor: pointer; color: #aaa; }
        .nav-link.active { color: #fff; font-weight: bold; border-bottom: 2px solid #8000ff; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div id="authStatus">جاري التحقق من صلاحيات الأدمن...</div>

    <div id="adminPanel" class="d-none">
        <!-- التبويبات -->
        <ul class="nav mb-4">
            <li class="nav-item"><a class="nav-link active" id="tabAdd" onclick="switchTab('add')">إضافة منتج</a></li>
            <li class="nav-item"><a class="nav-link" id="tabOrders" onclick="switchTab('orders')">الطلبات</a></li>
        </ul>

        <!-- قسم إضافة منتجات -->
        <div id="addSection">
            <div class="card">
                <h3 class="mb-3" id="formTitle">إضافة منتج متقدم (باقات)</h3>
                <input type="text" id="pName" class="form-control mb-2" placeholder="اسم اللعبة/البرنامج">
                <select id="pCat" class="form-control mb-2">
                    <option value="games">ألعاب</option>
                    <option value="apps">تطبيقات</option>
                    <option value="social">دعم سوشيال</option>
                    <option value="cards">بطاقات</option>
                </select>
                <input type="file" id="pImage" class="form-control mb-3">
                <input type="text" id="pPrompt" class="form-control mb-3" placeholder="جملة الطلب">
                <h5>باقات المنتج:</h5>
                <div id="packagesContainer"></div>
                <button id="addPackageBtn" class="btn btn-outline-light mb-3 btn-sm">+ أضف باقة جديدة</button>
                <button id="addBtn" class="btn btn-primary w-100 py-2">حفظ المنتج</button>
            </div>

            <div class="card">
                <h3>المنتجات الحالية</h3>
                <table class="table table-dark table-hover align-middle">
                    <thead><tr><th>الاسم</th><th>تحكم</th></tr></thead>
                    <tbody id="pTable"></tbody>
                </table>
            </div>
        </div>

        <!-- قسم الطلبات -->
        <div id="ordersSection" class="d-none">
            <div class="card">
                <h3>طلبات الزبائن</h3>
                <table class="table table-dark table-hover align-middle">
                    <thead><tr><th>المنتج</th><th>البيانات</th><th>تحكم</th></tr></thead>
                    <tbody id="oTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAEKNtK6UVtLySjxp5IlXL7es8bC8M9w-Y",
      authDomain: "yasser-store-7e736.firebaseapp.com",
      projectId: "yasser-store-7e736",
      storageBucket: "yasser-store-7e736.firebasestorage.app",
      messagingSenderId: "363907199851",
      appId: "1:363907199851:web:f36f479fa91b53823c922e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore();

    window.switchTab = (tab) => {
        document.getElementById('addSection').classList.toggle('d-none', tab !== 'add');
        document.getElementById('ordersSection').classList.toggle('d-none', tab !== 'orders');
        document.getElementById('tabAdd').classList.toggle('active', tab === 'add');
        document.getElementById('tabOrders').classList.toggle('active', tab === 'orders');
    };

    onAuthStateChanged(getAuth(), (user) => {
        if (user && user.email === "yasserramadanhoms@gmail.com") {
            document.getElementById('authStatus').classList.add('d-none');
            document.getElementById('adminPanel').classList.remove('d-none');
            renderData();
        }
    });

    document.getElementById('addPackageBtn').addEventListener('click', () => {
        const row = document.createElement('div');
        row.className = 'package-row row g-2 align-items-center';
        row.innerHTML = `<div class="col-6"><input type="text" class="form-control pkg-name" placeholder="الكمية"></div>
                         <div class="col-4"><input type="text" class="form-control pkg-price" placeholder="السعر"></div>
                         <div class="col-2"><button class="btn btn-danger btn-sm w-100" onclick="this.parentElement.parentElement.remove()">X</button></div>`;
        document.getElementById('packagesContainer').appendChild(row);
    });

    async function renderData() {
        // المنتجات
        const pTable = document.getElementById('pTable');
        pTable.innerHTML = "";
        const pSnap = await getDocs(collection(db, "products"));
        pSnap.forEach(d => {
            pTable.innerHTML += `<tr><td>${d.data().name}</td><td>
                <button class="btn btn-sm btn-danger" onclick="delP('${d.id}')">حذف</button></td></tr>`;
        });
        // الطلبات
        const oTable = document.getElementById('oTable');
        oTable.innerHTML = "";
        const oSnap = await getDocs(collection(db, "orders"));
        oSnap.forEach(d => {
            oTable.innerHTML += `<tr><td>${d.data().productName}</td><td>${d.data().userData}</td>
                <td><button class="btn btn-sm btn-danger" onclick="delO('${d.id}')">مسح</button></td></tr>`;
        });
    }

    document.getElementById('addBtn').addEventListener('click', async () => {
        const file = document.getElementById('pImage').files[0];
        if(!file) return alert("اختر صورة!");
        
        const formData = new FormData(); formData.append('image', file);
        const res = await fetch('https://api.imgbb.com/1/upload?key=d4153c26566671cd622f560fa7986321', { method: 'POST', body: formData });
        const imgData = await (await res).json();

        const packages = [];
        document.querySelectorAll('.package-row').forEach(r => {
            packages.push({ name: r.querySelector('.pkg-name').value, price: r.querySelector('.pkg-price').value });
        });

        await setDoc(doc(db, "products", Date.now().toString()), {
            name: document.getElementById('pName').value,
            image: imgData.data.url,
            inputPrompt: document.getElementById('pPrompt').value,
            packages: packages
        });
        alert("تم الحفظ!");
        renderData();
    });

    window.delP = async (id) => { if(confirm("حذف؟")) { await deleteDoc(doc(db, "products", id)); renderData(); } };
    window.delO = async (id) => { await deleteDoc(doc(db, "orders", id)); renderData(); };
</script>
</body>
</html>
