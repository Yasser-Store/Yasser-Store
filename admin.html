<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - Yasser-Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; }
        .card { background-color: #26004d; border: 2px solid #4d0099; padding: 20px; color: #fff; }
        input, select { background-color: #1a0033 !important; color: white !important; border: 1px solid #4d0099 !important; }
        .btn-admin { background-color: #8000ff; color: white; border: none; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div id="authSection" class="text-center">
        <h3>جاري التحقق من صلاحياتك...</h3>
    </div>
    
    <div id="adminPanel" class="card d-none">
        <h3>إضافة منتج جديد</h3>
        <input type="text" id="pName" class="form-control mb-2" placeholder="اسم المنتج">
        <select id="pCategory" class="form-control mb-2">
            <option value="games">ألعاب</option>
            <option value="apps">تطبيقات</option>
            <option value="social">دعم سوشيال</option>
            <option value="cards">بطاقات</option>
        </select>
        <input type="file" id="pImage" class="form-control mb-2">
        <button id="addBtn" class="btn btn-admin w-100">رفع المنتج</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { /* (ضع نفس اعداداتك هنا) */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();
    const ADMIN_EMAIL = "yasserramadanhoms@gmail.com";

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === ADMIN_EMAIL) {
            document.getElementById('authSection').classList.add('d-none');
            document.getElementById('adminPanel').classList.remove('d-none');
        } else {
            document.getElementById('authSection').innerHTML = "<h3>غير مصرح لك بالدخول!</h3>";
        }
    });

    document.getElementById('addBtn').addEventListener('click', async () => {
        const file = document.getElementById('pImage').files[0];
        const name = document.getElementById('pName').value;
        const category = document.getElementById('pCategory').value;

        // 1. رفع الصورة لـ ImgBB
        const formData = new FormData();
        formData.append('image', file);
        
        const response = await fetch('https://api.imgbb.com/1/upload?key=d4153c26566671cd622f560fa7986321', {
            method: 'POST', body: formData
        });
        const result = await response.json();
        const imageUrl = result.data.url;

        // 2. حفظ في فايربيس
        await setDoc(doc(db, "products", Date.now().toString()), { name, category, image: imageUrl });
        alert("تم إضافة المنتج بنجاح!");
    });
</script>
</body>
</html>
