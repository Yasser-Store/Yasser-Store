<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ياسر تيك - إدارة المنتجات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #0d0d0d;
            color: #f0e6ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-custom {
            background: #1a0033;
            border-bottom: 2px solid #4d0099;
            padding: 12px 0;
        }
        .navbar-custom .navbar-brand {
            font-weight: bold;
            color: #fff;
        }
        .card {
            background: linear-gradient(145deg, #1a0033, #26004d);
            border: 1px solid #6a1b9a;
            border-radius: 20px;
            padding: 25px;
            color: #fff;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(128, 0, 255, 0.2);
            transition: all 0.3s;
        }
        .card:hover {
            box-shadow: 0 15px 40px rgba(128, 0, 255, 0.4);
        }
        input, select, .form-control {
            background-color: #1f0040 !important;
            color: #fff !important;
            border: 1px solid #7b1fa2 !important;
            border-radius: 12px !important;
            padding: 12px !important;
        }
        input:focus, select:focus {
            border-color: #b388ff !important;
            box-shadow: 0 0 0 0.2rem rgba(179, 136, 255, 0.3) !important;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c4dff, #651fff);
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: 0.3s;
            color: #fff;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #651fff, #7c4dff);
        }
        .btn-outline-light {
            border-radius: 30px;
            border-color: #b388ff;
            color: #b388ff;
        }
        .btn-outline-light:hover {
            background: #b388ff;
            color: #1a0033;
        }
        .btn-warning {
            background: #ffab00;
            border: none;
            color: #1a0033;
            font-weight: bold;
        }
        .btn-warning:hover {
            background: #ffc107;
        }
        .btn-danger {
            background: #d32f2f;
            border: none;
        }
        .btn-danger:hover {
            background: #f44336;
        }
        .package-row {
            background: #13002b;
            border-radius: 15px;
            border: 1px dashed #9c27b0;
            padding: 12px;
            margin-bottom: 10px;
        }
        .table {
            color: #f0e6ff;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        .table thead th {
            border-bottom: 2px solid #7b1fa2;
            color: #b388ff;
            font-weight: 600;
            padding: 12px;
        }
        .table tbody tr {
            background: #1a0033;
            border-radius: 12px;
            transition: 0.2s;
        }
        .table tbody tr:hover {
            background: #2a0055;
            transform: scale(1.01);
        }
        .table tbody td {
            padding: 12px;
            vertical-align: middle;
            border: none;
        }
        #authStatus {
            padding: 30px;
            text-align: center;
            font-size: 1.3rem;
            background: #1a0033;
            border-radius: 30px;
            margin-top: 50px;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .section-title i {
            font-size: 2rem;
            color: #b388ff;
        }
        .form-label {
            font-weight: 500;
            color: #ce93d8;
        }
        .btn-back {
            background: #8000ff;
            color: #fff;
            border: none;
            padding: 5px 15px;
            border-radius: 30px;
        }
        .btn-back:hover {
            background: #6a00cc;
        }
        .category-badge {
            background: #4d0099;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #fff;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand fw-bold"><i class="bi bi-speedometer2"></i> لوحة التحكم</span>
            <button class="btn btn-back" onclick="window.location.href='index.html'">
                <i class="bi bi-house"></i> المتجر
            </button>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="authStatus">🔐 جاري التحقق من صلاحيات الأدمن...</div>

        <div id="adminPanel" class="d-none">

            <!-- قسم إضافة/تعديل المنتجات -->
            <div id="addSection">
                <div class="card">
                    <div class="section-title">
                        <i class="bi bi-box-seam"></i>
                        <h3 id="formTitle">إضافة منتج جديد</h3>
                    </div>
                    <input type="text" id="pName" class="form-control mb-3" placeholder="اسم اللعبة / البرنامج">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label"><i class="bi bi-folder"></i> القسم</label>
                            <select id="pCat" class="form-control">
                                <option value="games">🎮 ألعاب</option>
                                <option value="apps">📱 تطبيقات</option>
                                <option value="social">🌐 دعم سوشيال</option>
                                <option value="cards">💳 بطاقات</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label"><i class="bi bi-image"></i> صورة المنتج</label>
                            <input type="file" id="pImage" class="form-control" accept="image/*">
                            <small class="text-muted">اتركه فارغاً للحفاظ على الصورة الحالية (في حالة التعديل).</small>
                        </div>
                    </div>

                    <input type="text" id="pPrompt" class="form-control mb-3" placeholder="جملة الطلب (مثال: أرسل معرفك)">

                    <label class="form-label"><i class="bi bi-grid-3x3-gap-fill"></i> الباقات</label>
                    <div id="packagesContainer"></div>
                    <button id="addPackageBtn" class="btn btn-outline-light btn-sm mb-3"><i class="bi bi-plus-lg"></i> أضف باقة</button>

                    <button id="addBtn" class="btn btn-primary w-100 py-2"><i class="bi bi-save"></i> حفظ المنتج</button>
                </div>

                <!-- قائمة المنتجات -->
                <div class="card">
                    <div class="section-title">
                        <i class="bi bi-grid"></i>
                        <h3>المنتجات الحالية</h3>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead><tr><th>الاسم</th><th>القسم</th><th>التحكم</th></tr></thead>
                            <tbody id="pTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAEKNtK6UVtLySjxp5IlXL7es8bC8M9w-Y",
          authDomain: "yasser-store-7e736.firebaseapp.com",
          projectId: "yasser-store-7e736",
          storageBucket: "yasser-store-7e736.firebasestorage.app",
          messagingSenderId: "363907199851",
          appId: "1:363907199851:web:f36f479fa91b53823c922e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth();

        let editingProductId = null;

        // أسماء الأقسام لعرضها في الجدول
        const categoryNames = {
            'games': '🎮 ألعاب',
            'apps': '📱 تطبيقات',
            'social': '🌐 دعم سوشيال',
            'cards': '💳 بطاقات'
        };

        // عرض المنتجات
        async function renderProducts() {
            const tbody = document.getElementById('pTable');
            tbody.innerHTML = '';
            try {
                const snap = await getDocs(collection(db, "products"));
                snap.forEach(doc => {
                    const p = doc.data();
                    const catName = categoryNames[p.category] || p.category || 'بدون قسم';
                    tbody.innerHTML += `
                        <tr>
                            <td>${p.name}</td>
                            <td><span class="category-badge">${catName}</span></td>
                            <td>
                                <button class="btn btn-sm btn-warning me-2" onclick="editProduct('${doc.id}')"><i class="bi bi-pencil-square"></i> تعديل</button>
                                <button class="btn btn-sm btn-danger" onclick="delP('${doc.id}')"><i class="bi bi-trash"></i> حذف</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">فشل تحميل المنتجات</td></tr>';
                console.error(e);
            }
        }

        // --- دوال المنتجات ---
        window.delP = async (id) => {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
            await deleteDoc(doc(db, "products", id));
            renderProducts();
        };

        window.editProduct = async (id) => {
            const docSnap = await getDocs(collection(db, "products"));
            let product = null;
            docSnap.forEach(d => {
                if (d.id === id) {
                    product = { id: d.id, ...d.data() };
                }
            });
            if (!product) return alert('المنتج غير موجود');

            editingProductId = id;
            document.getElementById('formTitle').textContent = 'تعديل المنتج';
            document.getElementById('addBtn').innerHTML = '<i class="bi bi-arrow-repeat"></i> تحديث المنتج';

            document.getElementById('pName').value = product.name || '';
            document.getElementById('pPrompt').value = product.inputPrompt || '';
            const select = document.getElementById('pCat');
            if (product.category) {
                select.value = product.category;
            }

            const container = document.getElementById('packagesContainer');
            container.innerHTML = '';
            if (product.packages && Array.isArray(product.packages)) {
                product.packages.forEach(pkg => {
                    const row = document.createElement('div');
                    row.className = 'package-row row g-2 align-items-center';
                    row.innerHTML = `
                        <div class="col-6"><input type="text" class="form-control pkg-name" value="${pkg.name || ''}" placeholder="الكمية"></div>
                        <div class="col-4"><input type="text" class="form-control pkg-price" value="${pkg.price || ''}" placeholder="السعر"></div>
                        <div class="col-2"><button class="btn btn-danger btn-sm w-100" onclick="this.parentElement.parentElement.remove()"><i class="bi bi-x"></i></button></div>
                    `;
                    container.appendChild(row);
                });
            }

            document.getElementById('pImage').value = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // --- إضافة باقة جديدة ---
        document.getElementById('addPackageBtn').addEventListener('click', () => {
            const row = document.createElement('div');
            row.className = 'package-row row g-2 align-items-center';
            row.innerHTML = `
                <div class="col-6"><input type="text" class="form-control pkg-name" placeholder="الكمية (مثل: 1000 متابع)"></div>
                <div class="col-4"><input type="text" class="form-control pkg-price" placeholder="السعر (مثل: 5$ أو 150 ج.م)"></div>
                <div class="col-2"><button class="btn btn-danger btn-sm w-100" onclick="this.parentElement.parentElement.remove()"><i class="bi bi-x"></i></button></div>
            `;
            document.getElementById('packagesContainer').appendChild(row);
        });

        // --- حفظ / تحديث المنتج ---
        document.getElementById('addBtn').addEventListener('click', async () => {
            const name = document.getElementById('pName').value.trim();
            const prompt = document.getElementById('pPrompt').value.trim();
            const category = document.getElementById('pCat').value;
            const file = document.getElementById('pImage').files[0];

            if (!name) return alert('الرجاء إدخال اسم المنتج');
            if (!category) return alert('الرجاء اختيار قسم');

            const packages = [];
            document.querySelectorAll('.package-row').forEach(row => {
                const pkgName = row.querySelector('.pkg-name').value.trim();
                const pkgPrice = row.querySelector('.pkg-price').value.trim();
                if (pkgName && pkgPrice) {
                    packages.push({ name: pkgName, price: pkgPrice });
                }
            });

            let imageUrl = null;
            if (file) {
                const formData = new FormData();
                formData.append('image', file);
                try {
                    const res = await fetch('https://api.imgbb.com/1/upload?key=d4153c26566671cd622f560fa7986321', {
                        method: 'POST',
                        body: formData
                    });
                    const imgData = await res.json();
                    if (imgData.success) {
                        imageUrl = imgData.data.url;
                    } else {
                        alert('فشل رفع الصورة، حاول مرة أخرى');
                        return;
                    }
                } catch (e) {
                    alert('خطأ في رفع الصورة: ' + e.message);
                    return;
                }
            }

            const productData = { name, inputPrompt: prompt, category, packages };
            if (imageUrl) productData.image = imageUrl;

            try {
                if (editingProductId) {
                    await updateDoc(doc(db, "products", editingProductId), productData);
                    alert('تم تحديث المنتج بنجاح!');
                } else {
                    if (!imageUrl) return alert('يجب اختيار صورة للمنتج الجديد!');
                    await setDoc(doc(db, "products", Date.now().toString()), productData);
                    alert('تم إضافة المنتج بنجاح!');
                }
            } catch (err) {
                alert('حدث خطأ: ' + err.message);
            }

            // إعادة تعيين النموذج
            editingProductId = null;
            document.getElementById('formTitle').textContent = 'إضافة منتج جديد';
            document.getElementById('addBtn').innerHTML = '<i class="bi bi-save"></i> حفظ المنتج';
            document.getElementById('pName').value = '';
            document.getElementById('pPrompt').value = '';
            document.getElementById('pImage').value = '';
            document.getElementById('packagesContainer').innerHTML = '';
            document.getElementById('addPackageBtn').click();
            renderProducts();
        });

        // --- التحقق من الأدمن ---
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "yasserramadanhoms@gmail.com") {
                document.getElementById('authStatus').classList.add('d-none');
                document.getElementById('adminPanel').classList.remove('d-none');
                // إضافة باقة افتراضية
                document.getElementById('addPackageBtn').click();
                renderProducts();
            } else {
                document.getElementById('authStatus').innerHTML = '⚠️ غير مصرح لك بالدخول. حساب الأدمن فقط.';
            }
        });

    </script>
</body>
</html>
