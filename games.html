<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الألعاب - Yasser-Store</title>
    <!-- مكتبة التصميم CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .navbar { background-color: #1a0033; border-bottom: 2px solid #4d0099; }
        .card { background-color: #26004d; border: 2px solid #4d0099; border-radius: 15px; overflow: hidden; margin-bottom: 20px; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: scale(1.05); border-color: #8000ff; box-shadow: 0 0 15px rgba(128, 0, 255, 0.5); }
        .card-img-top { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .card-body { color: #fff; text-align: center; padding: 10px; }
        .btn-back { background-color: #8000ff; color: white; border: none; padding: 5px 15px; }
        
        /* تصميم النافذة المنبثقة */
        .modal-content { background-color: #1a0033; border: 2px solid #4d0099; border-radius: 15px; color: white; }
        .modal-header { border-bottom: 1px solid #4d0099; }
        .package-item { background-color: #26004d; border: 1px solid #8000ff; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-order { background-color: #8000ff; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-weight: bold; }
        .custom-input { background-color: #000 !important; color: white !important; border: 1px solid #8000ff !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand fw-bold">الألعاب</span>
        <button class="btn btn-back" onclick="history.back()">رجوع</button>
    </div>
</nav>

<div class="container mt-4">
    <div class="row g-3" id="gamesContainer">
        <h4 class="text-center mt-5 text-secondary">جاري تحميل الألعاب...</h4>
    </div>
</div>

<!-- النافذة المنبثقة (Modal) -->
<div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" id="modalTitle">اسم المنتج</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        
        <!-- قائمة الباقات -->
        <div id="packagesList">
            <!-- ستظهر الباقات هنا برمجياً -->
        </div>

        <!-- فورم الطلب (مخفي في البداية) -->
        <div id="orderForm" class="d-none">
            <div class="alert alert-info" style="background-color: #26004d; color: white; border: 1px solid #8000ff;">
                <strong>الباقة المختارة:</strong> <span id="selectedPkgName"></span> <br>
                <strong>السعر:</strong> <span id="selectedPkgPrice" class="text-warning"></span>
            </div>
            
            <label id="inputPromptText" class="form-label fw-bold mt-2">أدخل البيانات المطلوبة:</label>
            <input type="text" id="userInput" class="form-control custom-input mb-3" placeholder="اكتب هنا...">
            
            <button id="confirmBtn" class="btn btn-order w-100 py-2">إرسال الطلب عبر تيليجرام</button>
            <button class="btn btn-secondary w-100 py-2 mt-2" onclick="showPackagesOnly()">إلغاء واختيار باقة أخرى</button>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- مكتبة الجافاسكربت لعمل النافذة المنبثقة -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAEKNtK6UVtLySjxp5IlXL7es8bC8M9w-Y",
      authDomain: "yasser-store-7e736.firebaseapp.com",
      projectId: "yasser-store-7e736",
      storageBucket: "yasser-store-7e736.firebasestorage.app",
      messagingSenderId: "363907199851",
      appId: "1:363907199851:web:f36f479fa91b53823c922e"
    };
    const db = getFirestore(initializeApp(firebaseConfig));

    // متغير عالمي لحفظ المنتجات لتسهيل الوصول إليها عند النقر
    window.allProducts = {};
    let currentProductModal = null; // سيحفظ كائن النافذة المنبثقة

    async function loadGames() {
        const container = document.getElementById('gamesContainer');
        try {
            const querySnapshot = await getDocs(collection(db, "products"));
            container.innerHTML = "";
            let found = false;

            querySnapshot.forEach((doc) => {
                const p = doc.data();
                if (p.category === "games") {
                    found = true;
                    // حفظ المنتج في المتغير العالمي بناءً على الـ ID
                    window.allProducts[doc.id] = p;
                    
                    container.innerHTML += `
                        <div class="col-6 col-md-4">
                            <!-- أضفنا دالة النقر هنا -->
                            <div class="card" onclick="openProductModal('${doc.id}')">
                                <img src="${p.image}" class="card-img-top">
                                <div class="card-body"><h6 class="mb-0 fw-bold">${p.name}</h6></div>
                            </div>
                        </div>`;
                }
            });

            if (!found) {
                container.innerHTML = "<h4 class='text-center mt-5'>لا توجد ألعاب مضافة حالياً.</h4>";
            }
        } catch (e) {
            container.innerHTML = "<h4 class='text-center mt-5 text-danger'>حدث خطأ في الاتصال.</h4>";
        }
    }

    // --- دوال التحكم بالنافذة المنبثقة ---

    // 1. فتح النافذة وتجهيز الباقات
    window.openProductModal = (id) => {
        const product = window.allProducts[id];
        document.getElementById('modalTitle').innerText = product.name;
        
        const packagesList = document.getElementById('packagesList');
        packagesList.innerHTML = ""; // تفريغ القديم

        if (product.packages && product.packages.length > 0) {
            product.packages.forEach((pkg, index) => {
                packagesList.innerHTML += `
                    <div class="package-item">
                        <div>
                            <h5 class="mb-1">${pkg.name}</h5>
                            <span class="text-warning fw-bold">${pkg.price}</span>
                        </div>
                        <button class="btn btn-order" onclick="prepareOrder('${id}', ${index})">طلب</button>
                    </div>
                `;
            });
        } else {
            packagesList.innerHTML = "<p class='text-center'>لا توجد باقات متوفرة لهذا المنتج.</p>";
        }

        showPackagesOnly(); // التأكد من إظهار الباقات وإخفاء فورم الطلب
        
        // تشغيل النافذة المنبثقة
        if (!currentProductModal) {
            currentProductModal = new bootstrap.Modal(document.getElementById('productModal'));
        }
        currentProductModal.show();
    };

    // 2. إظهار فورم الطلب بعد اختيار باقة
    window.prepareOrder = (productId, pkgIndex) => {
        const product = window.allProducts[productId];
        const pkg = product.packages[pkgIndex];

        // تعبئة البيانات في الفورم
        document.getElementById('selectedPkgName').innerText = pkg.name;
        document.getElementById('selectedPkgPrice').innerText = pkg.price;
        document.getElementById('inputPromptText').innerText = product.inputPrompt || "أدخل البيانات:";
        document.getElementById('userInput').value = ""; // تصفير الحقل

        // إخفاء الباقات وإظهار الفورم
        document.getElementById('packagesList').classList.add('d-none');
        document.getElementById('orderForm').classList.remove('d-none');

        // تجهيز زر الإرسال النهائي
        document.getElementById('confirmBtn').onclick = () => {
            const userData = document.getElementById('userInput').value;
            if (!userData) {
                alert("الرجاء إدخال البيانات المطلوبة!");
                return;
            }
            sendToTelegram(product.name, pkg.name, pkg.price, product.inputPrompt, userData);
        };
    };

    // 3. العودة لقائمة الباقات (إذا تراجع المستخدم)
    window.showPackagesOnly = () => {
        document.getElementById('packagesList').classList.remove('d-none');
        document.getElementById('orderForm').classList.add('d-none');
    };

    // 4. وظيفة إرسال الطلب
    function sendToTelegram(productName, pkgName, price, promptMsg, userData) {
        // في هذه الخطوة، سنقوم بإغلاق النافذة المنبثقة وعرض رسالة نجاح مبدئية.
        alert(`تم استلام طلبك بنجاح!\n\nالمنتج: ${productName}\nالباقة: ${pkgName}\nالمبلغ: ${price}\nبياناتك (${promptMsg}): ${userData}`);
        
        if (currentProductModal) {
            currentProductModal.hide();
        }
        
        // (الكود الفعلي للربط مع تيليجرام سيتم إضافته هنا لاحقاً)
    }

    loadGames();
</script>
</body>
</html>
