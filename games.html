<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الألعاب - Yasser-Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .card { background-color: #26004d; border: 2px solid #4d0099; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .card-img-top { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .card-body { color: #fff; text-align: center; padding: 10px; }
        .btn-back { background-color: #4d0099; color: white; border: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container">
        <span class="navbar-brand fw-bold">الألعاب</span>
        <button class="btn btn-back btn-sm" onclick="history.back()">رجوع</button>
    </div>
</nav>

<div class="container mt-4">
    <div class="row g-3" id="gamesContainer">
        <h4 class="text-center mt-5">جاري جلب الألعاب...</h4>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { /* (نفس إعداداتك) */ };
    const db = getFirestore(initializeApp(firebaseConfig));

    async function loadGames() {
    const container = document.getElementById('gamesContainer');
    
    try {
        const q = query(collection(db, "products"), where("category", "==", "games"));
        const querySnapshot = await getDocs(q);
        
        // --- هذا التعديل سيظهر لك الحقيقة على الشاشة مباشرة ---
        if (querySnapshot.empty) {
            container.innerHTML = "<h4>لم أجد أي منتج تصنيفه 'games' في قاعدة البيانات. تأكد من تطابق الحروف!</h4>";
        } else {
            container.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const product = doc.data();
                container.innerHTML += `
                    <div class="col-4">
                        <div class="card">
                            <img src="${product.image}" class="card-img-top">
                            <div class="card-body"><h6>${product.name}</h6></div>
                        </div>
                    </div>
                `;
            });
        }
        // ----------------------------------------------------
    } catch (error) {
        container.innerHTML = "<h4>خطأ: " + error.message + "</h4>";
    }
}


    loadGames();
</script>
</body>
</html>
