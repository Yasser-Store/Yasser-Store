<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج - Yasser-Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .card { background-color: #26004d; border: 2px solid #4d0099; border-radius: 15px; padding: 20px; }
        .product-img { width: 100%; border-radius: 15px; margin-bottom: 20px; }
        .btn-buy { background-color: #8000ff; color: white; width: 100%; border: none; margin-top: 10px; }
        .btn-back { background-color: #4d0099; color: white; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card">
        <button class="btn btn-back btn-sm mb-3" onclick="history.back()">رجوع</button>
        <img id="productImage" class="product-img" src="" alt="صورة المنتج">
        <h2 id="productName" class="text-center">جاري التحميل...</h2>
        <div id="optionsContainer" class="mt-4">
            </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { /* (ضع نفس اعداداتك هنا) */ };
    const db = getFirestore(initializeApp(firebaseConfig));

    // 1. استخراج الـ ID من الرابط (مثلاً: product-details.html?id=pubg1)
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    async function loadProduct() {
        const docRef = doc(db, "products", productId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('productName').innerText = data.name;
            document.getElementById('productImage').src = data.image;
            
            // إنشاء أزرار الخيارات (مثلاً 60UC, 120UC)
            const container = document.getElementById('optionsContainer');
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-buy';
                btn.innerText = opt.label + " - " + opt.price;
                btn.onclick = () => alert("تم اختيار " + opt.label); // هنا سنربطها لاحقاً بطلب التيلجرام
                container.appendChild(btn);
            });
        }
    }

    loadProduct();
</script>
</body>
</html>
