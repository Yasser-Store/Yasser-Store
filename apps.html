<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التطبيقات - Yasser-Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .navbar { background-color: #1a0033 !important; }
        
        /* تنسيق الكرت المربع */
        .card { 
            background-color: #26004d; 
            border: 2px solid #4d0099; 
            border-radius: 15px; 
            overflow: hidden; 
            margin-bottom: 20px;
        }
        
        /* جعل الصورة مربعة تماماً */
        .card-img-top { 
            width: 100%; 
            aspect-ratio: 1 / 1; /* يضمن أن الطول يساوي العرض دائماً */
            object-fit: cover; /* لملء المربع دون تشويه */
        }

        .card-body { color: #fff; text-align: center; padding: 10px; }
        .btn-back { background-color: #8000ff; color: white; border: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark p-3">
        <div class="container">
            <span class="navbar-brand fw-bold">التطبيقات</span>
            <button class="btn btn-back btn-sm" onclick="history.back()">رجوع</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row g-3">
            <!-- كرت التطبيق رقم 1 -->
            <div class="col-4">
                <div class="card">
                    <img src="app1.jpg" class="card-img-top">
                    <div class="card-body"><h6>اسم التطبيق 1</h6></div>
                </div>
            </div>
            <!-- كرت التطبيق رقم 2 -->
            <div class="col-4">
                <div class="card">
                    <img src="app2.jpg" class="card-img-top">
                    <div class="card-body"><h6>اسم التطبيق 2</h6></div>
                </div>
            </div>
            <!-- كرت التطبيق رقم 3 -->
            <div class="col-4">
                <div class="card">
                    <img src="app3.jpg" class="card-img-top">
                    <div class="card-body"><h6>اسم التطبيق 3</h6></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
